name: Auto-fix Agent

on:
  workflow_run:
    workflows:
      - "Playwright CI (deterministic tests)"
      - "LLM Quality (LLM Judge tests)"
      - "LLM Eval Nightly (Ragas + Giskard)"
    types: [completed]

jobs:
  # Gate job runs unconditionally so the workflow conclusion is "success"
  # instead of "skipped" when there's nothing to fix. Without this,
  # every passing upstream run produced a "Run skipped" email.
  gate:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.decide.outputs.should_run }}
    steps:
      - id: decide
        run: |
          conclusion="${{ github.event.workflow_run.conclusion }}"
          echo "Upstream workflow conclusion: $conclusion"
          if [ "$conclusion" = "failure" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "Nothing to fix — exiting cleanly so the run isn't marked as skipped."
          fi

  auto-fix:
    needs: gate
    if: needs.gate.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # No pip install needed — auto_fix_agent.py + llm_client.py use
      # only Python stdlib (urllib.request). All rotation logic is local.

      - name: Configure git
        run: |
          git config user.email "qa-apps@users.noreply.github.com"
          git config user.name "qa-apps and claude"

      - name: Download test artifacts from failed run
        uses: actions/github-script@v7
        with:
          script: |
            const runId = context.payload.workflow_run.id;
            const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: runId,
            });
            const fs = require('fs');
            for (const artifact of artifacts.data.artifacts) {
              const names = ['test-results', 'playwright-report', 'eval-results'];
              if (names.some(n => artifact.name.includes(n))) {
                const zip = await github.rest.actions.downloadArtifact({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  artifact_id: artifact.id,
                  archive_format: 'zip',
                });
                fs.writeFileSync(`${artifact.name}.zip`, Buffer.from(zip.data));
                console.log(`Downloaded: ${artifact.name}.zip`);
              }
            }

      - name: Extract artifacts
        run: |
          for f in *.zip; do
            [ -f "$f" ] && unzip -o "$f" -d "${f%.zip}/" && echo "Extracted $f" || true
          done

      - name: Run auto-fix agent
        # All LLM keys are plumbed through so .github/scripts/llm_client.py
        # can rotate through every configured provider until one answers.
        # Missing keys are simply skipped — no need to gate per-provider.
        env:
          GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
          CEREBRAS_API_KEY:   ${{ secrets.CEREBRAS_API_KEY }}
          SAMBANOVA_API_KEY:  ${{ secrets.SAMBANOVA_API_KEY }}
          MISTRAL_API_KEY:    ${{ secrets.MISTRAL_API_KEY }}
          OPENAI_API_KEY:     ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL:    ${{ secrets.OPENAI_BASE_URL }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          HF_TOKEN:           ${{ secrets.HF_TOKEN }}
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN:       ${{ secrets.GITHUB_TOKEN }}
          # Slack ping when a PR is opened — no webhook needed, bot token only.
          # PR-review pings go to the dedicated #ci-pr-review channel; the
          # bug-reports channel stays the fallback if PR_REVIEW_CHANNEL_ID is unset.
          SLACK_BOT_TOKEN:        ${{ secrets.SLACK_BOT_TOKEN }}
          PR_REVIEW_CHANNEL_ID:   ${{ secrets.PR_REVIEW_CHANNEL_ID }}
          BUG_REPORTS_CHANNEL_ID: ${{ secrets.BUG_REPORTS_CHANNEL_ID }}
          FAILED_RUN_ID:      ${{ github.event.workflow_run.id }}
          FAILED_RUN_URL:     ${{ github.event.workflow_run.html_url }}
          PIPELINE:           ${{ github.event.workflow_run.name }}
          REPO:               ${{ github.repository }}
          HEAD_SHA:           ${{ github.event.workflow_run.head_sha }}
          HEAD_BRANCH:        ${{ github.event.workflow_run.head_branch }}
        run: python .github/scripts/auto_fix_agent.py
