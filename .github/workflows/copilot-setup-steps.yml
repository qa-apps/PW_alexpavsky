name: "Copilot Setup Steps"

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v5

    - uses: actions/setup-node@v5
      with:
        node-version: lts/*

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    # This is a test-only repo — there's no app to build. Instead, validate
    # that Playwright can load and parse every spec, which is the equivalent
    # of "compile-checks pass" for this codebase. Gives the Copilot agent
    # a verified working environment for running tests.
    #
    # The previous step ran `npx run build`, which is invalid: `npx` has no
    # `run` subcommand, so it tried to download a phantom package named
    # `run` and hung until cancelled (see run 26192834855).
    - name: Validate Playwright setup
      run: npx playwright test --list
