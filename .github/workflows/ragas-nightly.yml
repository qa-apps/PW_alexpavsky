name: LLM Eval Nightly (Ragas + Giskard)

on:
  # Manual trigger from Actions UI
  workflow_dispatch:
    inputs:
      max_questions:
        description: 'Limit questions (0 = all)'
        required: false
        default: '0'
      rag_api_url:
        description: 'RAG API URL'
        required: false
        default: 'https://alexpavsky.com'

  # Nightly at 03:30 UTC (11:30 PM EDT). Offset from playwright-ci nightly
  # runs (02:00 / 03:00) so the two suites don't fight for runners.
  schedule:
    - cron: '30 3 * * *'

concurrency:
  group: ragas-nightly-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  evaluate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout existing gh-pages site (if any)
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages-existing
        continue-on-error: true

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'eval/requirements.txt'

      - name: Install Ragas + LangChain
        run: |
          python -m pip install --upgrade pip
          pip install -r eval/requirements.txt

      - name: Pre-download sentence-transformers model
        run: |
          python -c "from sentence_transformers import SentenceTransformer; SentenceTransformer('all-MiniLM-L6-v2')"

      - name: Run Ragas evaluation
        env:
          # Judge LLM auto-rotation — uses whichever providers have keys.
          # Order of priority (configured in eval/rotating_llm.py):
          #   1. Groq           (fastest, daily token limit)
          #   2. Cerebras       (very fast, generous tier)
          #   3. Sambanova      (free tier)
          #   4. Mistral        (free tier)
          #   5. OpenRouter     (3 free models)
          #   6. Hugging Face   (router endpoint)
          GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
          CEREBRAS_API_KEY:   ${{ secrets.CEREBRAS_API_KEY }}
          SAMBANOVA_API_KEY:  ${{ secrets.SAMBANOVA_API_KEY }}
          MISTRAL_API_KEY:    ${{ secrets.MISTRAL_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          HF_TOKEN:           ${{ secrets.HF_TOKEN }}
          # RAG API endpoint (production)
          RAG_API_URL: ${{ inputs.rag_api_url || 'https://alexpavsky.com' }}
          # Quality gates
          MAX_QUESTIONS: ${{ inputs.max_questions || '0' }}
          MIN_FAITHFULNESS: '0.65'
          MIN_RELEVANCY: '0.55'
          REQUEST_DELAY_SEC: '2.0'
        run: |
          python eval/ragas_eval.py

      - name: Run Giskard RAG eval (auto-generated questions)
        if: always()
        working-directory: eval
        env:
          GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
          CEREBRAS_API_KEY:   ${{ secrets.CEREBRAS_API_KEY }}
          SAMBANOVA_API_KEY:  ${{ secrets.SAMBANOVA_API_KEY }}
          MISTRAL_API_KEY:    ${{ secrets.MISTRAL_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          HF_TOKEN:           ${{ secrets.HF_TOKEN }}
          RAG_API_URL: ${{ inputs.rag_api_url || 'https://alexpavsky.com' }}
          GISKARD_NUM_QUESTIONS: '3'
        run: |
          python giskard_rag.py || echo "Giskard RAG eval finished with non-zero exit"

      - name: Run Giskard vulnerability scan (7 categories)
        if: always()
        working-directory: eval
        env:
          GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
          CEREBRAS_API_KEY:   ${{ secrets.CEREBRAS_API_KEY }}
          SAMBANOVA_API_KEY:  ${{ secrets.SAMBANOVA_API_KEY }}
          MISTRAL_API_KEY:    ${{ secrets.MISTRAL_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          HF_TOKEN:           ${{ secrets.HF_TOKEN }}
          RAG_API_URL: ${{ inputs.rag_api_url || 'https://alexpavsky.com' }}
        run: |
          python giskard_scan.py || echo "Giskard scan finished with non-zero exit"

      - name: Upload eval reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-reports-${{ github.run_number }}
          path: |
            eval/results/report.md
            eval/results/giskard_rag.html
            eval/results/giskard_rag.json
            eval/results/giskard_scan.html
            eval/results/giskard_scan.json
          retention-days: 30
          if-no-files-found: warn

      - name: Build GitHub Pages site
        if: always()
        env:
          RUN_NUMBER: ${{ github.run_number }}
          RUN_ID: ${{ github.run_id }}
          COMMIT_SHA: ${{ github.sha }}
          REPO_SLUG: ${{ github.repository }}
        run: |
          python scripts/build_eval_site.py

      - name: Publish to gh-pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./gh-pages-site
          force_orphan: false
          enable_jekyll: false
          commit_message: "eval site: run #${{ github.run_number }}"
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"

      - name: Post summary to job
        if: always()
        env:
          REPO_NAME: ${{ github.event.repository.name }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          OWNER_LC=$(echo "$REPO_OWNER" | tr '[:upper:]' '[:lower:]')
          PAGES_URL="https://${OWNER_LC}.github.io/${REPO_NAME}"
          echo "## 📊 Live dashboard" >> "$GITHUB_STEP_SUMMARY"
          echo "- All runs: ${PAGES_URL}/" >> "$GITHUB_STEP_SUMMARY"
          echo "- This run: ${PAGES_URL}/runs/${{ github.run_number }}/" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -f eval/results/report.md ]; then
            echo "## Ragas Evaluation Summary" >> "$GITHUB_STEP_SUMMARY"
            head -30 eval/results/report.md >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -f eval/results/giskard_rag.json ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "## Giskard RAG Eval" >> "$GITHUB_STEP_SUMMARY"
            echo '```json' >> "$GITHUB_STEP_SUMMARY"
            cat eval/results/giskard_rag.json >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -f eval/results/giskard_scan.json ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "## Giskard Vulnerability Scan" >> "$GITHUB_STEP_SUMMARY"
            echo '```json' >> "$GITHUB_STEP_SUMMARY"
            cat eval/results/giskard_scan.json >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Notify Slack
        if: always()
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          # Parse Ragas scores from report if available and pass as overrides
          PASSED=0; FAILED=0
          if [ -f eval/results/report.md ]; then
            # Extract pass/fail from Ragas report (lines like "PASS: 5, FAIL: 1")
            PASSED=$(grep -oP '(?<=passed:\s)\d+' eval/results/report.md | head -1 || echo 0)
            FAILED=$(grep -oP '(?<=failed:\s)\d+' eval/results/report.md | head -1 || echo 0)
          fi
          python .github/scripts/notify_slack.py \
            --channel C0B4HD2L9CP \
            --pipeline "RAG Eval Nightly" \
            --passed "${PASSED:-0}" \
            --failed "${FAILED:-0}" \
            --flaky 0 \
            --skipped 0
