name: Playwright CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:
  schedule:
    # Run nightly at 10 PM EDT (02:00 UTC). No gate needed — GitHub cron
    # delays make exact-hour checks unreliable; just let it run whenever
    # the scheduler delivers it (usually within ±30 min of 10 PM EDT).
    - cron: '0 2 * * *'    # nightly at 10 PM EDT
    - cron: '0 10 * * 1'   # weekly on Monday 10:00 UTC — model registry refresh

concurrency:
  group: playwright-ci-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: false

jobs:
  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up k6
        uses: grafana/setup-k6-action@v1

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: npm test
        env:
          CI: true
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}

      - name: Run k6 performance profile
        run: npm run performance

      - name: Run k6 load profile
        run: npm run performance:load

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 14
          if-no-files-found: ignore

      - name: Notify Slack
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          JOB_STATUS: ${{ job.status }}
          REPOSITORY: ${{ github.repository }}
          BRANCH_NAME: ${{ github.ref_name }}
          EVENT_NAME: ${{ github.event_name }}
          ACTOR_NAME: ${{ github.actor }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          if [[ -z "$SLACK_WEBHOOK_URL" ]]; then
            echo "SLACK_WEBHOOK_URL is not configured. Skipping Slack notification."
            exit 0
          fi

          python - <<'PY'
          import json
          import os
          import urllib.request

          status = os.environ["JOB_STATUS"]
          color = {
              "success": "good",
              "failure": "danger",
              "cancelled": "warning",
          }.get(status, "#808080")

          payload = {
              "text": f"Playwright CI {status.upper()} for {os.environ['REPOSITORY']}",
              "attachments": [
                  {
                      "color": color,
                      "fields": [
                          {"title": "Repository", "value": os.environ["REPOSITORY"], "short": True},
                          {"title": "Branch", "value": os.environ["BRANCH_NAME"], "short": True},
                          {"title": "Event", "value": os.environ["EVENT_NAME"], "short": True},
                          {"title": "Actor", "value": os.environ["ACTOR_NAME"], "short": True},
                          {"title": "Run", "value": os.environ["RUN_URL"], "short": False},
                      ],
                  }
              ],
          }

          request = urllib.request.Request(
              os.environ["SLACK_WEBHOOK_URL"],
              data=json.dumps(payload).encode("utf-8"),
              headers={"Content-Type": "application/json"},
          )
          urllib.request.urlopen(request).read()
          PY

      - name: Send email notification
        if: always()
        env:
          MAIL_TO: ${{ secrets.MAIL_TO }}
          MAIL_SERVER: ${{ secrets.MAIL_SERVER }}
          MAIL_PORT: ${{ secrets.MAIL_PORT }}
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          JOB_STATUS: ${{ job.status }}
          REPOSITORY: ${{ github.repository }}
          BRANCH_NAME: ${{ github.ref_name }}
          EVENT_NAME: ${{ github.event_name }}
          ACTOR_NAME: ${{ github.actor }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          if [[ -z "$MAIL_TO" || -z "$MAIL_SERVER" ]]; then
            echo "Email secrets not configured. Skipping email notification."
            exit 0
          fi

          python - <<'PY'
          import smtplib, os
          from email.mime.text import MIMEText

          status   = os.environ["JOB_STATUS"]
          icon     = "✅ PASS" if status == "success" else "❌ FAIL"
          subject  = f"[{icon}] Playwright CI — {os.environ['REPOSITORY']} ({os.environ['BRANCH_NAME']})"
          body     = (
              f"Playwright CI finished with status: {status}\n\n"
              f"Repository  : {os.environ['REPOSITORY']}\n"
              f"Branch      : {os.environ['BRANCH_NAME']}\n"
              f"Event       : {os.environ['EVENT_NAME']}\n"
              f"Triggered by: {os.environ['ACTOR_NAME']}\n"
              f"Run URL     : {os.environ['RUN_URL']}\n"
          )

          msg = MIMEText(body)
          msg["Subject"] = subject
          msg["From"]    = f"Playwright CI <{os.environ['MAIL_USERNAME']}>"
          msg["To"]      = os.environ["MAIL_TO"]

          port = int(os.environ.get("MAIL_PORT") or 587)
          with smtplib.SMTP(os.environ["MAIL_SERVER"], port) as smtp:
              smtp.starttls()
              smtp.login(os.environ["MAIL_USERNAME"], os.environ["MAIL_PASSWORD"])
              smtp.send_message(msg)
          PY
