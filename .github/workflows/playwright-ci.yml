name: Playwright CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:
  schedule:
    # Run nightly at 10 PM EDT (02:00 UTC). No gate needed — GitHub cron
    # delays make exact-hour checks unreliable; just let it run whenever
    # the scheduler delivers it (usually within ±30 min of 10 PM EDT).
    - cron: '0 2 * * *'

concurrency:
  group: playwright-ci-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: false

jobs:
  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: npm test
        env:
          CI: true
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 14
          if-no-files-found: ignore

      - name: Notify Slack
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          JOB_STATUS: ${{ job.status }}
          REPOSITORY: ${{ github.repository }}
          BRANCH_NAME: ${{ github.ref_name }}
          EVENT_NAME: ${{ github.event_name }}
          ACTOR_NAME: ${{ github.actor }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          if [[ -z "$SLACK_WEBHOOK_URL" ]]; then
            echo "SLACK_WEBHOOK_URL is not configured. Skipping Slack notification."
            exit 0
          fi

          python - <<'PY'
          import json
          import os
          import urllib.request

          status = os.environ["JOB_STATUS"]
          color = {
              "success": "good",
              "failure": "danger",
              "cancelled": "warning",
          }.get(status, "#808080")

          payload = {
              "text": f"Playwright CI {status.upper()} for {os.environ['REPOSITORY']}",
              "attachments": [
                  {
                      "color": color,
                      "fields": [
                          {"title": "Repository", "value": os.environ["REPOSITORY"], "short": True},
                          {"title": "Branch", "value": os.environ["BRANCH_NAME"], "short": True},
                          {"title": "Event", "value": os.environ["EVENT_NAME"], "short": True},
                          {"title": "Actor", "value": os.environ["ACTOR_NAME"], "short": True},
                          {"title": "Run", "value": os.environ["RUN_URL"], "short": False},
                      ],
                  }
              ],
          }

          request = urllib.request.Request(
              os.environ["SLACK_WEBHOOK_URL"],
              data=json.dumps(payload).encode("utf-8"),
              headers={"Content-Type": "application/json"},
          )
          urllib.request.urlopen(request).read()
          PY

      - name: Send email notification
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_SERVER }}
          server_port: ${{ secrets.MAIL_PORT || 587 }}
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          to: ${{ secrets.MAIL_TO }}
          from: Playwright CI <${{ secrets.MAIL_USERNAME }}>
          subject: "[${{ job.status == 'success' && '✅ PASS' || '❌ FAIL' }}] Playwright CI — ${{ github.repository }} (${{ github.ref_name }})"
          body: |
            Playwright CI finished with status: ${{ job.status }}

            Repository : ${{ github.repository }}
            Branch     : ${{ github.ref_name }}
            Event      : ${{ github.event_name }}
            Triggered by: ${{ github.actor }}
            Run URL    : ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        continue-on-error: true
